name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Build with the localhost URL so canonical tags + sitemap entries match
      # what the seo-check crawler hits at runtime. Production sets this in the
      # hosting env; CI is just smoke-testing the build output.
      NEXT_PUBLIC_SITE_URL: http://localhost:3999
      PORT: 3999

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm start &
          echo $! > .server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3999 > /dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: SEO check
        run: SEO_CHECK_BASE_URL=http://localhost:3999 npm run seo-check

      - name: Stop server
        if: always()
        run: |
          if [ -f .server.pid ]; then
            kill "$(cat .server.pid)" || true
          fi
